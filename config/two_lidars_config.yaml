# config/two_lidars_config.yaml
multi_lidar_node:
  ros__parameters:
    # The base frame for the merged point cloud
    base_frame_id: "base_link"
    # Topic for the merged point cloud
    merged_topic_name: "/points_merged"
    # Enable/Disable 3D PCD publishing
    publish_3d_pcd: true
    # Publishing frequency in Hz
    publish_frequency: 10.0

    # Enable/Disable initial ICP calibration. Set to false to skip.
    enable_icp_calibration: false

    # ROI Filter parameters - DISABLED
    enable_roi_filter: false

    # Voxel Grid Filter parameters - ENABLED
    enable_voxel_filter: true
    voxel_leaf_size: 0.01 # 1cm

    # FlatScan (LaserScan) parameters
    publish_flatscan: true
    flatscan_topic_name: "/flatscan"
    flatscan_min_height: 0.1
    flatscan_max_height: 1.0
    flatscan_angle_min: -3.14159
    flatscan_angle_max: 3.14159
    flatscan_angle_increment: 0.0087
    flatscan_range_min: 0.1
    flatscan_range_max: 30.0

    # This list of strings determines the number of lidars. The content doesn't matter.
    lidars: ["lidar_1", "lidar_2"]

    # Lidar 1 configuration block (indexed from 0)
    lidars.0:
      name: "lidar_1"
      enabled: true
      driver:
        lidar_type: "RSAIRY"
        input_type: "online"
        msop_port: 6668
        difop_port: 7778
      pointcloud:
        frame_id: "lidar_1_link"
      tf:
        x: 0.0
        y: 0.0
        z: 0.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

    # Lidar 2 configuration block (indexed from 1)
    lidars.1:
      name: "lidar_2"
      enabled: true
      driver:
        lidar_type: "RSAIRY"
        input_type: "online"
        msop_port: 6667
        difop_port: 7777
      pointcloud:
        frame_id: "lidar_2_link"
      tf:
        x: -1.0
        y: 0.0
        z: 0.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0