# config/two_lidars_config.yaml
multi_lidar_node:
  ros__parameters:
    # The base frame for the merged point cloud
    base_frame_id: "base_link"
    # Topic for the merged point cloud
    merged_topic_name: "/points_merged"
    # Enable/Disable 3D PCD publishing
    publish_3d_pcd: true
    # Publishing frequency in Hz
    publish_frequency: 10.0

    # Enable/Disable initial ICP calibration. Set to false to skip.
    enable_icp_calibration: true

    # ROI Filter parameters - DISABLED
    enable_roi_filter: false
    # This list of strings determines the number of filters. The content can be anything.
    roi_filters: ["exclude_base_link_box"]

    # Voxel Grid Filter parameters - ENABLED
    enable_voxel_filter: true
    voxel_leaf_size: 0.005 # 5mm

    # FlatScan (LaserScan) parameters
    publish_flatscan: true
    flatscan_topic_name: "/flatscan"
    flatscan_min_height: 0.1
    flatscan_max_height: 1.0
    flatscan_angle_min: -3.14159
    flatscan_angle_max: 3.14159
    flatscan_angle_increment: 0.0087
    flatscan_range_min: 0.1
    flatscan_range_max: 30.0

    # This list of strings determines the number of lidars. The content can be anything.
    lidars: ["lidar_0", "lidar_1"]

    # Filter 0 configuration block
    roi_filters.0:
      name: "exclude_base_link_box"
      type: "negative"
      min_x: -0.4
      max_x: 0.7
      min_y: -0.35
      max_y: 0.35
      min_z: 0.0
      max_z: 1.0

    # Lidar 0 configuration block
    lidars.0:
      name: "lidar_0"
      enabled: true
      driver:
        lidar_type: "RSAIRY"
        input_type: "online"
        msop_port: 6668
        difop_port: 7778
      pointcloud:
        frame_id: "lidar_0_link"
        publish_raw: true
        raw_topic: "/lidar_0/points_raw"
      tf:
        x: 0.6
        y: -0.35
        z: 0.8
        roll: 3.14159
        pitch: 1.5708
        yaw: 0.0

    # Lidar 1 configuration block
    lidars.1:
      name: "lidar_1"
      enabled: true
      driver:
        lidar_type: "RSAIRY"
        input_type: "online"
        msop_port: 6667
        difop_port: 7777
      pointcloud:
        frame_id: "lidar_1_link"
        publish_raw: true
        raw_topic: "/lidar_1/points_raw"
      tf:
        x: -0.3
        y: 0.35
        z: 0.0
        roll: 0.0
        pitch: 0.0
        yaw: 2.3562
