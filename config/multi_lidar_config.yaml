# config/multi_lidar_config.yaml
multi_lidar_node:
  ros__parameters:
    # The base frame for the merged point cloud
    base_frame_id: "base_link"
    # Topic for the merged point cloud
    merged_topic_name: "/points_merged"
    # Enable/Disable 3D PCD publishing
    publish_3d_pcd: true
    # Publishing frequency in Hz
    publish_frequency: 10.0

    # ROI Filter parameters
    enable_roi_filter: true
    roi_filters:
      - name: "exclude_base_link_box"
        type: "negative"
        min_x: -0.5
        max_x: 0.5
        min_y: -0.5
        max_y: 0.5
        min_z: -0.5
        max_z: 0.5

    # Voxel Grid Filter parameters
    enable_voxel_filter: false
    voxel_leaf_size: 0.1 # meters

    # FlatScan (LaserScan) parameters
    publish_flatscan: false
    flatscan_topic_name: "/flatscan"
    flatscan_min_height: -0.1 # min Z for points to consider
    flatscan_max_height: 0.1  # max Z for points to consider
    flatscan_angle_min: -3.14159 # -M_PI
    flatscan_angle_max: 3.14159  # M_PI
    flatscan_angle_increment: 0.0087 # approx 0.5 degrees
    flatscan_range_min: 0.1
    flatscan_range_max: 100.0

    # List of lidars to be configured
    lidars:
      # Lidar 0
      - name: "lidar_0"
        enabled: true
        driver:
          lidar_type: "RS16"
          input_type: "online"
          msop_port: 6699
          difop_port: 7788
        pointcloud:
          frame_id: "lidar_0_link"
        # TF from base_frame_id to this lidar's frame_id
        tf:
          x: 0.6
          y: -0.35
          z: 0.8
          roll: -0.5236
          pitch: 1.5708
          yaw: 0.0

      # Lidar 1
      - name: "lidar_1"
        enabled: true
        driver:
          lidar_type: "RS16"
          input_type: "online"
          msop_port: 6700
          difop_port: 7789
        pointcloud:
          frame_id: "lidar_1_link"
        # TF from base_frame_id to this lidar's frame_id
        tf:
          x: -0.3
          y: 0.35
          z: 0.0
          roll: 0.0
          pitch: 0.0
          yaw: -2.3562